name: Deploy Bot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Cloudflare Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Configure SSH Config for Cloudflare
        run: |
          mkdir -p ~/.ssh
          # O segredo SERVER_HOST deve ser o seu subdomínio (ex: ssh.seudominio.com)
          echo "Host ${{ secrets.SERVER_HOST }}" > ~/.ssh/config
          echo "  ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_CLIENT_ID }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET }}" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Executar Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: tayadm
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Note: NÃO incluímos proxy_command aqui. 
          # A action usará automaticamente a config que criamos acima.
          script: |
            cd /home/tayadm/github/chatbot
            git pull origin main
            DOCKER_BUILDKIT=1 docker-compose up -d --build