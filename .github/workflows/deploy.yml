name: Deploy Chatbot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Cloudflare Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Executar Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Definindo comando do cloudflared com protocolo estável
          CF_COMMAND="cloudflared access tcp --hostname ssh.secretariacasaforte.com.br --service-token-id ${{ secrets.CF_CLIENT_ID }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET }} --protocol quic"
          
          # Tenta 3 vezes com intervalo de 5 segundos
          for i in {1..3}; do
            ssh -o StrictHostKeyChecking=no \
                -o ConnectTimeout=15 \
                -o ProxyCommand="$CF_COMMAND" \
                tayadm@ssh.secretariacasaforte.com.br \
                "cd /home/tayadm/github/chatbot && git pull origin main && docker compose build --no-cache && docker compose up -d --force-recreate --remove-orphans --no-deps whatsapp-bot"
          done