name: Deploy Chatbot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Cloudflare Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Executar Deploy via SSH
        run: |
          # Verifica se o cloudflared está funcional
          cloudflared --version
          
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          cat <<EOF > ~/.ssh/config
          Host my-server
              HostName ${{ secrets.SERVER_HOST }}
              User tayadm
              IdentityFile ~/.ssh/id_rsa
              StrictHostKeyChecking no
              BatchMode yes
              ConnectTimeout 60
              ProxyCommand cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_CLIENT_ID }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET }} --raw
          EOF

          # Executando o comando direto para evitar erro de sessão
          ssh my-server "cd /home/tayadm/github/chatbot && git pull origin main && docker compose up -d --build"