name: Deploy Bot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Passo essencial para instalar o cliente que fala com a Cloudflare
      - name: Install Cloudflare Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Executar Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: tayadm
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Comando que usa os tokens que você configurou nos Secrets
          proxy_command: /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_CLIENT_ID }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET }}
          script: |
            cd /home/tayadm/github/chatbot
            git pull origin main
            DOCKER_BUILDKIT=1 docker-compose up -d --build