name: Deploy Chatbot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Cloudflare Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Executar Deploy via SSH
        run: |
          # 1. Configurar diretório e chave
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 2. Criar arquivo de config para simplificar o comando SSH
          cat <<EOF > ~/.ssh/config
          Host my-server
              HostName ${{ secrets.SERVER_HOST }}
              User tayadm
              IdentityFile ~/.ssh/id_rsa
              StrictHostKeyChecking no
              ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_CLIENT_ID }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET }} --raw
          EOF

          # 3. Executar o comando usando o alias configurado
          ssh my-server << 'EOF'
            cd /home/tayadm/github/chatbot
            git pull origin main
            # Usando sudo se o seu usuário precisar para o docker
            docker compose up -d --build
          EOF